base_images:
  cli:
    name: "4.16"
    namespace: ocp
    tag: cli
  dev-scripts:
    name: test
    namespace: ocp-kni
    tag: dev-scripts
  e2e-integration-tests-pf5:
    name: e2e-integration-tests-pf5
    namespace: netobserv
    tag: ci
  e2etests:
    name: netobserv-operator
    namespace: netobserv
    tag: ci
  upi-installer:
    name: "4.16"
    namespace: ocp
    tag: upi-installer
releases:
  arm64-latest:
    candidate:
      architecture: arm64
      product: ocp
      stream: nightly
      version: "4.16"
  latest:
    candidate:
      product: ocp
      stream: nightly
      version: "4.16"
resources:
  '*':
    requests:
      cpu: 100m
      memory: 200Mi
tests:
- as: netobserv-aws-ipi-amd-f14
  cron: 31 5 10,24 * *
  reporter_config:
    channel: '#team-qe-netobserv'
    job_states_to_report:
    - aborted
    - error
    - failure
    - success
    report_template: '{{ if eq .Status.State "success" }} :green_jenkins_circle: {{
      else }} :red_jenkins_circle: {{ end }} Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: aws-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6i.2xlarge
    test:
    - chain: openshift-e2e-test-netobserv-pf5
    workflow: cucushift-installer-rehearse-aws-ipi
- as: netobserv-aws-ipi-arm-f28
  cron: 16 12 12 * *
  reporter_config:
    channel: '#team-qe-netobserv'
    job_states_to_report:
    - aborted
    - error
    - failure
    - success
    report_template: '{{ if eq .Status.State "success" }} :green_jenkins_circle: {{
      else }} :red_jenkins_circle: {{ end }} Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: aws-qe
    env:
      BASE_DOMAIN: qe.devcluster.openshift.com
      COMPUTE_NODE_TYPE: m6gd.2xlarge
      OCP_ARCH: arm64
    test:
    - chain: openshift-e2e-test-netobserv-pf5
    workflow: cucushift-installer-rehearse-aws-ipi
- as: netobserv-metal-ds-ipi-ovn-dualstack-primaryv6-f360-ipv6
  capabilities:
  - intranet
  cron: 35 21 9 5 *
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v6v4
        MIRROR_IMAGES=true
        INSTALLER_PROXY=true
        NETWORK_TYPE=OVNKubernetes
      GINKGO_FOCUS_FILTER: "53844"
    test:
    - chain: openshift-e2e-test-netobserv-prepare-bm-cluster
    - chain: openshift-e2e-test-netobserv-pf5
    workflow: cucushift-installer-rehearse-baremetalds-ipi-ovn
- as: netobserv-metal-ds-ipi-ovn-ipv4-f360-virt
  capabilities:
  - intranet
  cron: 24 15 14 1 *
  steps:
    cluster_profile: equinix-ocp-metal-qe
    env:
      DEVSCRIPTS_CONFIG: |
        IP_STACK=v4
        MIRROR_IMAGES=true
        INSTALLER_PROXY=true
        NETWORK_TYPE=OVNKubernetes
      GINKGO_FOCUS_FILTER: with VMs
    test:
    - chain: openshift-e2e-test-netobserv-prepare-bm-cluster
    - chain: openshift-e2e-test-netobserv-pf5
    workflow: cucushift-installer-rehearse-baremetalds-ipi-ovn
- as: netobserv-vsphere-ipi-amd-f28-ipsec
  cron: 52 13 7 * *
  reporter_config:
    channel: '#team-qe-netobserv'
    job_states_to_report:
    - aborted
    - error
    - failure
    - success
    report_template: '{{ if eq .Status.State "success" }} :green_jenkins_circle: {{
      else }} :red_jenkins_circle: {{ end }} Job *{{.Spec.Job}}* ended with *{{.Status.State}}*.
      <{{.Status.URL}}|View logs>'
  steps:
    cluster_profile: vsphere-elastic
    env:
      GINKGO_FOCUS_FILTER: "82637"
    test:
    - chain: openshift-e2e-test-netobserv-pf5
    workflow: cucushift-installer-rehearse-vsphere-ipi-ovn-ipsec
zz_generated_metadata:
  branch: release-2.0
  org: openshift
  repo: network-observability-operator
  variant: nightly-4.16
